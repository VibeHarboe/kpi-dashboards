name: ageras_kpi
version: '1.0.0'
config-version: 2

profile: ageras_kpi

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  ageras_kpi:
    churn_lookback_days: 90
    upsell_min_tenure_days: 30
    debt_overdue_threshold_days: 30
    nps_low_score: 6
    nps_high_score: 9

models:
  ageras_kpi:
    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging"]
    intermediate:
      +materialized: ephemeral
      +schema: intermediate
      +tags: ["intermediate"]
    marts:
      +materialized: table
      +schema: marts
      +tags: ["marts"]
      supply_demand:
        +tags: ["supply_demand"]
      churn:
        +tags: ["churn"]
      upselling:
        +tags: ["upselling"]
      roi_partnerships:
        +tags: ["roi_partnerships"]
      debt_collection:
        +tags: ["debt_collection"]
      customer_satisfaction:
        +tags: ["customer_satisfaction"]
